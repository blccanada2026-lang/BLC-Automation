<!-- ══ ADMIN TOOLS PANEL (iteration-2 with-skill) ══════════════════════════════ -->

<style>
  #admin-tools-panel { display: none; margin-top: 24px; }
  .admin-tools-hdr { display: flex; justify-content: space-between; align-items: center;
                     margin-bottom: 14px; }
  .admin-tools-hdr h2 { font-size: 15px; font-weight: 700; }
  .admin-panel { background: var(--c-surface); border: 1px solid var(--c-border);
                 border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  .admin-panel-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .admin-spinner { display: none; width: 14px; height: 14px; border: 2px solid #ddd;
                   border-top-color: var(--c-secondary); border-radius: 50%;
                   animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .admin-status { margin-top: 14px; font-size: 13px; min-height: 20px; }
  .admin-status.ok  { color: var(--c-success); }
  .admin-status.err { color: var(--c-danger); }

  /* Toast */
  .notif { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
           border-radius: var(--radius); font-size: 13px; font-weight: 600;
           box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 200; transition: opacity .3s; }
  .notif-ok  { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
  .notif-err { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
</style>

<div id="admin-tools-panel">
  <div class="admin-tools-hdr"><h2>Admin Tools</h2></div>
  <div class="admin-panel">
    <div class="admin-panel-actions">
      <button class="btn-warning" id="btn-rebuild-views"   onclick="adminRebuildViews()">Rebuild Views</button>
      <button class="btn-primary" id="btn-refresh-dashboard" onclick="adminRefreshDashboard()">Refresh Dashboard</button>
      <div class="admin-spinner" id="admin-spinner"></div>
    </div>
    <div class="admin-status" id="admin-status"></div>
  </div>
</div>

<script>
  // Call from portal_getViewData success handler — actor.role gates section visibility.
  // Never use perms.* flags for role-based UI gating.
  function maybeShowAdminTools(actor) {
    if (actor.role === 'CEO' || actor.role === 'ADMIN') {
      document.getElementById('admin-tools-panel').style.display = 'block';
    }
  }

  function showNotif(msg, isErr) {
    var d = document.createElement('div');
    d.className   = 'notif ' + (isErr ? 'notif-err' : 'notif-ok');
    d.textContent = msg;
    document.body.appendChild(d);
    setTimeout(function() { d.style.opacity = '0'; }, 2800);
    setTimeout(function() { d.parentNode && d.parentNode.removeChild(d); }, 3200);
  }

  function adminSetStatus(msg, isErr) {
    var el = document.getElementById('admin-status');
    el.className  = 'admin-status' + (isErr ? ' err' : (msg ? ' ok' : ''));
    el.textContent = msg;
  }

  function adminSetBusy(on) {
    document.getElementById('btn-rebuild-views').disabled     = on;
    document.getElementById('btn-refresh-dashboard').disabled = on;
    document.getElementById('admin-spinner').style.display    = on ? 'inline-block' : 'none';
  }

  function adminRebuildViews() {
    adminSetBusy(true);
    adminSetStatus('Rebuilding views\u2026', false);
    google.script.run
      .withSuccessHandler(function(json) {
        adminSetBusy(false);
        var r = JSON.parse(json);
        var msg = 'Views rebuilt \u2014 ' + r.vw_job + ' job rows, ' +
                  r.vw_workload + ' workload rows (' + Math.round(r.elapsed_ms / 1000) + 's)';
        adminSetStatus(msg, false);
        showNotif(msg, false);
      })
      .withFailureHandler(function(err) {
        adminSetBusy(false);
        adminSetStatus('Rebuild failed: ' + err.message, true);
        showNotif('Rebuild failed: ' + err.message, true);
      })
      .portal_rebuildViews();
  }

  function adminRefreshDashboard() {
    adminSetBusy(true);
    adminSetStatus('Refreshing dashboard MARTs\u2026', false);
    google.script.run
      .withSuccessHandler(function(json) {
        adminSetBusy(false);
        var r = JSON.parse(json);
        var msg = 'Dashboard refreshed \u2014 ' + r.periods + ' periods (' +
                  Math.round(r.elapsed_ms / 1000) + 's)';
        adminSetStatus(msg, false);
        showNotif(msg, false);
      })
      .withFailureHandler(function(err) {
        adminSetBusy(false);
        adminSetStatus('Refresh failed: ' + err.message, true);
        showNotif('Refresh failed: ' + err.message, true);
      })
      .portal_refreshDashboard();
  }
</script>
